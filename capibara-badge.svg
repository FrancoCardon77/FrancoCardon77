<svg width="420" height="68" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0035"/>
      <stop offset="100%" stop-color="#05001a"/>
    </linearGradient>
    <linearGradient id="neon1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f0ff">
        <animate attributeName="stop-color" values="#00f0ff;#b400ff;#00f0ff" dur="2.5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#b400ff">
        <animate attributeName="stop-color" values="#b400ff;#00f0ff;#b400ff" dur="2.5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#00f0ff">
        <animate attributeName="stop-color" values="#00f0ff;#b400ff;#00f0ff" dur="2.5s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textglow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- fondo -->
  <rect width="420" height="68" rx="8" fill="url(#bg)"/>

  <!-- borde neon animado outer glow -->
  <rect width="418" height="66" x="1" y="1" rx="8" fill="none" stroke="url(#neon1)" stroke-width="4" opacity="0.4" filter="url(#glow)"/>

  <!-- borde neon animado inner -->
  <rect width="416" height="64" x="2" y="2" rx="7" fill="none" stroke="url(#neon1)" stroke-width="1.5" filter="url(#glow)"/>

  <!-- texto principal -->
  <text x="210" y="30" text-anchor="middle" fill="#e8c0ff" font-family="Courier New, monospace" font-size="15" font-weight="bold" letter-spacing="5" filter="url(#textglow)">CAPIBARA STUDIO</text>

  <!-- subtext -->
  <text x="210" y="50" text-anchor="middle" fill="#7090ff" font-family="Courier New, monospace" font-size="12" letter-spacing="2">capibara-studio.com ↗</text>
</svg>